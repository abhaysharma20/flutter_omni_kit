name: flutter_omni_kit
description: A comprehensive, production-grade collection of Flutter media widgets, document previewers, and Dart extension methods designed specifically for real-world app development.
version: 0.0.21
repository: https://github.com/abhaysharma20/flutter_omni_kit
homepage: https://github.com/abhaysharma20/flutter_omni_kit

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.0
  chewie: ^1.7.5
  just_audio: ">=0.9.36 <0.11.0"
  syncfusion_flutter_pdfviewer: ">=31.1.19 <34.0.0"
  open_filex: ^4.4.0
  cached_network_image: ^3.3.1
  dio: ^5.4.1
  shared_preferences: ^2.2.2
  connectivity_plus: ">=5.0.2 <8.0.0"
  shimmer: ^3.0.0
  rxdart: ">=0.27.7 <0.29.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
